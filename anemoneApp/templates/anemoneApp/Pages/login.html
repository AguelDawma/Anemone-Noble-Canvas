<!DOCTYPE html>
{% load static %}
<html lang="en">
    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <meta name="description" content="Login to your Animone Noble Canvas account and start making orders of clothes and art.">
        <meta property="og:type" content="website">
        <meta property="og:title" content="Login to Animone Noble Canvas">
        <title>Login</title>
        <link rel="stylesheet" href="{% static 'Styles/formStyle.css' %}">
        <link rel="stylesheet" href="{% static 'Styles/generalStyles.css' %}">
    </head>
    <body>
        <img src="{% static 'Images/Icons/back.png' %}" alt="back arrow" id="back-arrow">
        <h2>PLEASE ENTER YOUR LOGIN DETAILS.</h2>
        <div class="form_container" id="login-section">
            <form method="post" id="login-form">
                <p id="error-message"></p>
                
                <div class="imgcontainer">
                    <img src="{% static 'Images/navLogo.png' %}" alt="Avatar" class="avatar">
                </div>

                <div class="form-group">
                    <label for="email"><b>Email:</b></label>
                    <input type="email" placeholder="Enter email" name="email" id="email" required>

                    <label for="password"><b>Password:</b></label><!-- show password ability -->
                    <input type="password" placeholder="Enter Password" name="password" id="password" required>
                </div>

                <button type="submit" class="submit">Login</button>
                <label>
                    <input type="checkbox" id="remember"> Remember me
                </label>

                <div class="links-container">
                    <a href="{% url 'reset_password' %}">Forgot password?</a>
                    <a href="{% url 'signup' %}">Sign Up</a>
                </div>
            </form>
        </div>

        <footer>
            <p>© 2025 Anemone Noble Canvas. All rights reserved.</p>
            <a href="{% url 'about' %}" target="_blank">About</a>
            <a href="mailto: info@animonenoblecanvas.com" target="_blank">Contact Us</a>
            <a href="{% url 'terms' %}" target="_blank">Terms</a>
        </footer>

        <!--<script type="module" src="..\JS\firebase-config.js"></script>-->
        <script type="module" src="{% static 'JS/login.js' %}"></script>
        <script type="module" src="{% static 'JS/signup.js' %}"></script>

    </body>
</html>
