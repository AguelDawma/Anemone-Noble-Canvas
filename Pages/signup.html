<!DOCTYPE html>
<html lang="en">
    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <title>Sign Up</title>
        <link rel="stylesheet" href="..\Styles\formStyle.css">
        <link rel="stylesheet" href="..\Styles\generalStyles.css">
    </head>
    <body>
        <div>
            <img src="../Images/Icons/back.png" alt="back arrow" id="back-arrow">
            <h2>Create an Account</h2>
            
            <div class="form_container">
                <div class="imgcontainer">
                    <img src="..\Images\navLogo.png" alt="Avatar" class="avatar">
                </div>
                <form method="POST" id="signup-form">
                    <p id="signup-error-message"></p>
                    <div>
                        <label for="signupUsername">Username:</label>
                        <input type="text" id="signupUsername" name="username" required>
                    </div>
                    <div>
                        <label for="signupEmail">Email:</label>
                        <input type="email" id="signupEmail" name="email" required>
                    </div>
                    <div>
                        <label for="new-password">Password:</label>
                        <input type="password" id="new-password" title="password" required>
                    </div>
                    <div>
                        <label for="confirm-password">Confirm Password:</label>
                        <input type="password" id="confirm-password" name="confirm_password" required>
                    </div>
                    <div>
                        <button type="submit" class="submit">Sign Up</button>
                    </div>
                    
                </form>
                <div class="links-container">
                    Already have an account? <a href="login.html">Log In</a>
                </div>
            </div>
        </div>

        <footer>
            <p>© 2025 Anemone Noble Canvas. All rights reserved.</p>
            <a href="..\Pages\about.html" target="_blank">About</a>
            <a href="mailto: info@animonenoblecanvas.com" target="_blank">Contact Us</a>
            <a href="..\Pages\terms.html" target="_blank">Terms</a>
        </footer>

        <!--<script type="module" src="..\JS\firebase-config.js"></script>-->
        <script type="module" src="..\JS\login.js"></script>
        <script type="module" src="..\JS\signup.js"></script>
        
    </body>
</html>
