<!DOCTYPE html>
<html lang="en">
    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <meta name="description" content="Login to your Animone Noble Canvas account and start making orders of clothes and art.">
        <meta property="og:type" content="website">
        <meta property="og:title" content="Login to Animone Noble Canvas">
        <title>Login</title>
        <link rel="stylesheet" href="..\Styles\formStyle.css">
    </head>
    <body>
        <h2>PLEASE ENTER YOUR LOGIN DETAILS.</h2>
        <div class="form_container">
            <form method="post">
                <div class="imgcontainer">
                    <img src="..\Images\icon.jpg" alt="Avatar" class="avatar">
                </div>

                <div class="form-group">
                    <label for="uName"><b>Email:</b></label>
                    <input type="email" placeholder="Enter email" name="email" id="email" required>

                    <label for="pWord"><b>Password:</b></label><!-- show password ability -->
                    <input type="password" placeholder="Enter Password" name="password" id="password" required>

                    <button type="submit">Login</button>
                    <label>
                        <input type="checkbox" id="remember"> Remember me
                    </label>
                </div>

                <div class="links-container">
                    <a href="reset_pass.html">Forgot password?</a>
                    <a href="signup.html">Sign Up</a>
                </div>
            </form>
        </div>

        <script type="module" src="..\JS\firebase-config.js"></script>
        <script type="module" src="..\JS\login.js"></script>
        <script type="module" src="..\JS\signup.js"></script>
        
    </body>
    <footer>
        <p>© 2025 Anemone Noble Canvas. All rights reserved.</p>
        <p>Contact us at <a href="mailto:info@animonenoblecanvas.com">info@animonenoblecanvas.com</a></p>
    </footer>
</html>
